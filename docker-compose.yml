# Ani-Go Docker Compose 部署配置
# 使用方式: docker compose up -d

services:
  ani-go:
    build: .
    container_name: ani-go
    restart: unless-stopped
    ports:
      - "20001:20001"
    env_file:
      - .env
    volumes:
      # 番剧媒体库根目录（修改为你的实际路径）
      # NAS 示例: /volume1/Media:/TV/Media
      # fnOS 示例: /vol2/1000/TV:/TV/Media
      - /path/to/your/media:/TV/Media
      # 数据库持久化
      - ./data:/data
    environment:
      - PORT=20001
      - DB_PATH=/data/ani-go.db
      - TV_BASE_PATH=/TV/Media/番剧
      - MOVIE_BASE_PATH=/TV/Media/剧场版
      - OVA_BASE_PATH=/TV/Media/OVA
    # Lucky/Nginx 反向代理时取消注释：
    # network_mode: bridge
